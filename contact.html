    <main class="container">
        <section>
            <h2 class="section-title">Get In Touch</h2>
            <div class="card-grid">
                <div class="card">
                    <h3>Contact Information</h3>
                    <p style="margin-bottom: 1rem;">Have questions about our platform or want to collaborate? Reach out
                        to us!</p>
                    <p><strong>Email:</strong> <span data-bind="contactEmail">Loading...</span></p>
                    <p><strong>Phone:</strong> <span data-bind="contactPhone">Loading...</span></p>
                </div>
                <div class="card">
                    <h3>Send us a message</h3>
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" class="form-control" required></textarea>
                        </div>
                        <button type="submit" class="btn">Send Message</button>
                    </form>
                    <script>
                        document.getElementById('contact-form').addEventListener('submit', function(e) {
                            e.preventDefault();
                            const name = document.getElementById('name').value;
                            const email = document.getElementById('email').value;
                            const message = document.getElementById('message').value;
                            const subject = encodeURIComponent(`Message from ${name} via Agro Connect`);
                            const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`);
                            window.location.href = `mailto:agroconnect21@gmail.com?subject=${subject}&body=${body}`;
                        });
                    </script>
                </div>
            </div>
        </section>
    </main>
